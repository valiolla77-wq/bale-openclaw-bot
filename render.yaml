services:
  - type: worker
    name: bale-openclaw-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    envVars:
      - key: BALE_TOKEN
        fromService:
          name: bale-openclaw-bot
          type: env
      - key: PYTHONUNBUFFERED
        value: "1"
